// ---------- Reveal ----------
function useReveal() {
  React.useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
}

function Nav() {
  const [scrolled, setScrolled] = React.useState(false);
  const [hidden, setHidden] = React.useState(false);
  const [open, setOpen] = React.useState(false);
  const lastY = React.useRef(0);

  React.useEffect(() => {
    const fn = () => {
      const y = window.scrollY;
      const mobile = window.innerWidth < 768;
      setScrolled(y > 20);
      if (mobile && y > 80) {
        setHidden(y > lastY.current);
        if (y <= lastY.current) setOpen(false);
      } else {
        setHidden(false);
      }
      lastY.current = y;
    };
    fn(); window.addEventListener('scroll', fn, { passive: true });
    return () => window.removeEventListener('scroll', fn);
  }, []);

  return (
    <header className={`fixed top-0 inset-x-0 z-50 transition-all duration-300`}
      style={{ background: (scrolled || open) ? 'rgba(14,11,8,.60)' : 'rgba(14,11,8,.0)', borderBottom: (scrolled || open) ? '1px solid #2c2620' : '1px solid transparent', backdropFilter: (scrolled || open) ? 'blur(12px)' : 'none', transform: hidden ? 'translateY(-110%)' : 'translateY(0)' }}>

      {/* Desktop nav */}
      <div className="hidden md:grid max-w-7xl mx-auto px-8 h-20" style={{ gridTemplateColumns: '1fr auto 1fr' }}>
        <nav className="flex items-center gap-8">
          {NAV_LINKS.slice(0, 3).map(l => (
            <a key={l.id} href={`#${l.id}`} className="text-[11px] font-medium tracking-[0.2em] uppercase transition-colors hover:text-amber-400" style={{ color: '#d4cdc6' }}>{l.label}</a>

        </nav>
        <a href="#top" className="flex items-center justify-center">
          <img src="logo.jpg" alt={BRAND.name} style={{ height: '38px', width: 'auto', objectFit: 'contain' }} />
        </a>
        <div className="flex items-center justify-end gap-8">
          {NAV_LINKS.slice(3).map(l => (
            <a key={l.id} href={`#${l.id}`} className="text-[11px] font-medium tracking-[0.2em] uppercase transition-colors hover:text-amber-400" style={{ color: '#d4cdc6' }}>{l.label}</a>
          ))}
          <a href="#rezervare" className="text-[11px] font-medium tracking-[0.2em] uppercase px-4 py-2 transition-all hover:opacity-80" style={{ border: '1px solid var(--accent)', color: 'var(--accent)', marginLeft: '1rem' }}>
            Rezervă

        </div>
      </div>

      {/* Mobile nav */}
      <div className="md:hidden flex items-center justify-between px-5 h-16">
        <div className="w-8" />
        <a href="#top" className="absolute left-1/2 -translate-x-1/2 whitespace-nowrap">
          <img src="logo.jpg" alt={BRAND.name} style={{ height: '32px', width: 'auto', objectFit: 'contain' }} />

        <button onClick={() => setOpen(o => !o)} style={{ color: '#d4cdc6' }}>
          {open ? <XIcon size={22} /> : <MenuIcon size={22} />}
        </button>
      </div>
      <div className={`md:hidden overflow-hidden transition-all duration-300 border-t ${open ? 'max-h-96 opacity-100' : 'max-h-0 opacity-0'}`} style={{ background: 'rgba(14,11,8,.60)', backdropFilter: 'blur(12px)', borderColor: 'var(--border)' }}>
        <div className="px-5 py-4 flex flex-col gap-1">

// ---------- Hero ----------
function Hero() {
  const [slide, setSlide] = React.useState(0);
  const slides = [PHOTOS.hero3, PHOTOS.hero2, PHOTOS.hero1];
  React.useEffect(() => {
    const t = setInterval(() => setSlide(s => (s + 1) % slides.length), 4500);
    return () => clearInterval(t);
  }, []);
  return (
    <section id="top" className="relative h-screen min-h-[560px] overflow-hidden">
      {slides.map((src, i) => (
        <div key={i} className="absolute inset-0 transition-opacity duration-1000"

function Reservation() {
  const [form, setForm] = React.useState({ name: '', date: '', time: '19:30', guests: '2', phone: '', notes: '' });

  const today = new Date().toISOString().slice(0, 10);
  return (
    <section id="rezervare" className="py-16 md:py-32 px-5 md:px-8" style={{ background: 'var(--warm)' }}>

          <ul className="mt-8 space-y-4">
            {[
              { Icon: ClockIcon, text: 'Mar–Joi 12:00–23:00 · Vin–Sâm 12:00–00:00 · Dum 12:00–22:00 · Luni închis' },
              { Icon: PhoneIcon, text: BRAND.phone },
              { Icon: MailIcon,  text: BRAND.emailReservations },
            ].map(({ Icon, text }, i) => (
              <li key={i} className="flex items-start gap-3 text-[14px]" style={{ color: 'var(--muted)' }}>
                <Icon size={15} className="mt-0.5 flex-none" style={{ color: 'var(--accent)' }} />{text}
              </li>
            ))}
          </ul>
        </div>
        <form onSubmit={submit} className="reveal rounded-2xl p-6 md:p-8 border" style={{ background: 'var(--card)', borderColor: 'var(--border)', boxShadow: '0 4px 40px rgba(0,0,0,.4)' }}>
          <h3 className="font-display text-2xl mb-6" style={{ color: 'var(--text)' }}>Formular Rezervare</h3>
          <div className="space-y-5">
            <Field label="Nume complet"><input required type="text" value={form.name} onChange={set('name')} placeholder="Ion Popescu" className="w-full py-2.5 text-[15px] border-b focus:border-amber-500 transition-colors bg-transparent" style={{ borderColor: 'var(--border)', color: 'var(--text)' }} /></Field>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
              <Field label="Data"><input required type="date" min={today} value={form.date} onChange={set('date')} className="w-full py-2.5 text-[15px] border-b focus:border-amber-500 transition-colors bg-transparent" style={{ borderColor: 'var(--border)', color: 'var(--text)', colorScheme: 'dark' }} /></Field>
              <Field label="Ora">
                <select value={form.time} onChange={set('time')} className="w-full py-2.5 text-[15px] border-b focus:border-amber-500 transition-colors bg-transparent" style={{ borderColor: 'var(--border)', color: 'var(--text)' }}>
                  {['12:00','13:00','14:00','18:00','18:30','19:00','19:30','20:00','20:30','21:00','21:30'].map(t => <option key={t} value={t}>{t}</option>)}
                </select>
              </Field>
            </div>
            <Field label="Număr persoane">
              <div className="flex flex-wrap gap-2 pt-3">
                {['1','2','3','4','5','6','7','8+'].map(n => (
                  <button type="button" key={n} onClick={() => setForm(f => ({ ...f, guests: n }))}
                    className={`w-10 h-10 rounded-full text-[13px] font-medium transition-all border ${form.guests === n ? 'text-white border-transparent' : ''}`}
                    style={form.guests === n ? { background: 'var(--accent)', borderColor: 'var(--accent)' } : { borderColor: 'var(--border)', color: 'var(--muted)' }}>{n}</button>
                ))}
              </div>
            </Field>
            <Field label="Telefon"><input required type="tel" value={form.phone} onChange={set('phone')} placeholder="07XX XXX XXX" className="w-full py-2.5 text-[15px] border-b focus:border-amber-500 transition-colors bg-transparent" style={{ borderColor: 'var(--border)', color: 'var(--text)' }} /></Field>
            <Field label="Cerințe speciale (opțional)"><textarea rows="2" value={form.notes} onChange={set('notes')} placeholder="Aniversare, alergii, masă în exterior..." className="w-full py-2.5 text-[15px] border-b focus:border-amber-500 transition-colors bg-transparent resize-none" style={{ borderColor: 'var(--border)', color: 'var(--text)' }} /></Field>
            <button type="submit" className="w-full py-3.5 rounded-full text-[13px] font-medium tracking-wide text-white transition-opacity hover:opacity-90 flex items-center justify-center gap-2"
              style={{ background: submitted ? '#27ae60' : 'var(--accent)' }}>
              {submitted ? '✓ Rezervare trimisă!' : <><CalIcon size={15} /> Confirmă Rezervarea</>}
            </button>
            {submitted && <p className="text-center text-[12px] mt-2" style={{ color: 'var(--muted)' }}>Vă vom contacta în scurt timp pentru confirmare.</p>}
          </div>
        </form>
      </div>
    </section>
  );
}

function Reviews() {
  const total = REVIEWS.length;
  const [idx, setIdx] = React.useState(0);
  const touchStartX = React.useRef(null);
  const autoRef = React.useRef(null);

  const goTo = React.useCallback((i) => {
    setIdx(((i % total) + total) % total);
  }, [total]);

  const resetAuto = React.useCallback(() => {
    clearInterval(autoRef.current);
    autoRef.current = setInterval(() => goTo(i => ((i + 1) % total)), 4000);
  }, [goTo, total]);

  React.useEffect(() => {
    autoRef.current = setInterval(() => setIdx(i => (i + 1) % total), 4000);
    return () => clearInterval(autoRef.current);
  }, [total]);

  const onTouchStart = e => { touchStartX.current = e.touches[0].clientX; };
  const onTouchEnd = e => {
    if (touchStartX.current === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX.current;
    if (Math.abs(dx) > 40) { goTo(dx < 0 ? idx + 1 : idx - 1); resetAuto(); }
    touchStartX.current = null;
  };

  return (
    <section id="recenzii" className="py-16 md:py-32 overflow-hidden" style={{ background: '#ede8e0' }}>
      <div className="max-w-5xl mx-auto">
        <div className="reveal text-center mb-14 px-5">
          <p className="text-[11px] tracking-[0.45em] uppercase mb-3" style={{ color: 'var(--accent)' }}>Google Reviews</p>
          <h2 className="font-display text-4xl md:text-5xl" style={{ color: '#1a1612' }}>Ce spun<br /><em>clienții noștri.</em></h2>
          <div className="mt-5 flex items-center justify-center gap-2">
            {[1,2,3,4,5].map(i => <StarIcon key={i} filled={true} />)}
            <span className="text-[15px] font-medium ml-1" style={{ color: '#1a1612' }}>5.0</span>
            <span className="text-[13px]" style={{ color: '#6b5f54' }}>· pe Google</span>
          </div>
          <div className="mt-8 h-px w-16 mx-auto" style={{ background: 'var(--accent)' }} />
        </div>
      </div>

      {/* Centered peek carousel — card 68vw, gap 3vw, step 71vw */}
      <div
        className="relative"
        onTouchStart={onTouchStart}
        onTouchEnd={onTouchEnd}
      >
        <div
          className="flex items-start transition-transform duration-500 ease-in-out"
          style={{ gap: '3vw', transform: `translateX(calc(16vw - ${idx * 71}vw))` }}
        >
          {REVIEWS.map((r, i) => (
            <div
              key={i}
              className="flex-none transition-all duration-500"
              style={{
                width: '68vw',
                opacity: i === idx ? 1 : 0.2,
                transform: i === idx ? 'scale(1) translateY(0px)' : 'scale(0.95) translateY(28px)',
                pointerEvents: i === idx ? 'auto' : 'none',
              }}
              onClick={() => { if (i !== idx) { goTo(i); resetAuto(); } }}
            >
              <ReviewCard review={r} />
            </div>
          ))}
        </div>

        {/* Dots */}
        <div className="flex justify-center gap-1.5 mt-6">
          {REVIEWS.map((_, i) => (
            <button
              key={i}
              onClick={() => { goTo(i); resetAuto(); }}
              className="transition-all duration-300 rounded-full"
              style={{
                width: i === idx ? 20 : 6,
                height: 6,
                background: i === idx ? 'var(--accent)' : '#c4b8ac',
              }}
            />
          ))}
        </div>
      </div>
    </section>
  );
}

// ---------- Cart Item ----------
function CartItem({ item, onUpdateQty, onRemove }) {

        <div className="mt-2 flex items-center gap-2">
          <button onClick={() => onUpdateQty(item.name, item.qty - 1)} className="w-7 h-7 rounded-full flex items-center justify-center border transition-colors hover:border-amber-500" style={{ borderColor: 'var(--border)', color: 'var(--muted)' }}>
            <MinusIcon size={12} />

        <button onClick={() => onRemove(item.name)} className="w-7 h-7 rounded-full flex items-center justify-center transition-colors hover:bg-amber-900/20" style={{ color: 'var(--muted)' }}>

// ---------- Checkout Modal ----------
function CheckoutModal({ cart, total, onClose, onSuccess }) {
  const [form, setForm] = React.useState({ name: '', phone: '', address: '', notes: '' });
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');
  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

  React.useEffect(() => {
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, []);

  const submit = async (e) => {
    e.preventDefault();
    setLoading(true);
    setError('');
    try {
      const { error: err } = await db.from('orders').insert([{
        name: form.name,
        phone: form.phone,
        address: form.address,
        notes: form.notes,
        items: cart.map(i => ({ name: i.name, price: i.price, qty: i.qty })),
        total,
        status: 'nouă',
      }]);
      if (err) throw new Error(err.message);
      onSuccess();
    } catch (err) {
      setError(err.message || 'Eroare la plasarea comenzii. Încearcă din nou.');
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4" style={{ background: 'rgba(0,0,0,.6)' }}>
      <div className="rounded-2xl w-full max-w-md max-h-[90vh] overflow-y-auto shadow-2xl" style={{ background: '#110e0b' }}>
        <div className="flex items-center justify-between px-6 py-4 border-b sticky top-0 rounded-t-2xl" style={{ background: '#110e0b', borderColor: 'var(--border)' }}>
          <h2 className="font-display text-xl" style={{ color: 'var(--text)' }}>Finalizare Comandă</h2>
          <button onClick={onClose} className="w-8 h-8 rounded-full flex items-center justify-center transition-colors hover:bg-white/10" style={{ color: 'var(--muted)' }}>
            <XIcon size={16} />
          </button>
        </div>
        <div className="px-6 py-5">
          <div className="mb-6 rounded-xl p-4" style={{ background: 'var(--cream)' }}>
            <p className="text-[10px] tracking-[0.3em] uppercase font-medium mb-3" style={{ color: 'var(--muted)' }}>Sumar comandă</p>
            <div className="space-y-2">
              {cart.map(item => (
                <div key={item.name} className="flex justify-between text-[14px]">
                  <span style={{ color: 'var(--text)' }}>{item.name} <span style={{ color: 'var(--muted)' }}>×{item.qty}</span></span>
                  <span className="font-medium" style={{ color: 'var(--text)' }}>{item.price * item.qty} lei</span>
                </div>
              ))}
            </div>
            <div className="mt-3 pt-3 border-t flex justify-between" style={{ borderColor: 'var(--border)' }}>
              <span className="font-medium text-[14px]" style={{ color: 'var(--text)' }}>Total</span>
              <span className="font-display text-xl" style={{ color: 'var(--accent)' }}>{total} lei</span>
            </div>
          </div>
          <form onSubmit={submit} className="space-y-5">
            <Field label="Nume complet"><input required type="text" value={form.name} onChange={set('name')} placeholder="Ion Popescu" className="w-full py-2.5 text-[15px] border-b focus:border-amber-500 transition-colors bg-transparent" style={{ borderColor: 'var(--border)', color: 'var(--text)' }} /></Field>
            <Field label="Telefon"><input required type="tel" value={form.phone} onChange={set('phone')} placeholder="07XX XXX XXX" className="w-full py-2.5 text-[15px] border-b focus:border-amber-500 transition-colors bg-transparent" style={{ borderColor: 'var(--border)', color: 'var(--text)' }} /></Field>
            <Field label="Adresă de livrare"><textarea required rows="2" value={form.address} onChange={set('address')} placeholder="Strada, număr, apartament, oraș..." className="w-full py-2.5 text-[15px] border-b focus:border-amber-500 transition-colors bg-transparent resize-none" style={{ borderColor: 'var(--border)', color: 'var(--text)' }} /></Field>
            <Field label="Observații (opțional)"><textarea rows="2" value={form.notes} onChange={set('notes')} placeholder="Alergii, preferințe..." className="w-full py-2.5 text-[15px] border-b focus:border-amber-500 transition-colors bg-transparent resize-none" style={{ borderColor: 'var(--border)', color: 'var(--text)' }} /></Field>
            {error && <div className="px-4 py-3 rounded-xl text-[13px]" style={{ background: '#2a1010', color: '#f87171', border: '1px solid #4a1f1f' }}>{error}</div>}
            <button type="submit" disabled={loading} className="w-full py-3.5 rounded-full text-[13px] font-medium tracking-wide text-white flex items-center justify-center gap-2" style={{ background: 'var(--accent)', opacity: loading ? 0.7 : 1 }}>
              {loading ? 'Se trimite...' : <><BagIcon size={15} /> Plasează comanda</>}
            </button>
          </form>
        </div>
      </div>
    </div>
  );
}

}
